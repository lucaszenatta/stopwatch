<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  #stopwatchContainer {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    box-sizing: border-box;
  }
  #digitalDisplay {
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    white-space: nowrap;
    line-height: 1;
    user-select: none;
  }
  #segmentDisplay {
    width: 90vw;
    height: 60vh;
    user-select: none;
  }
  .hidden { display: none !important; }

  /* Export UI: only shown when export controls are enabled */
  #exportBar {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 8px;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 13px;
    color: #fff;
    z-index: 10;
  }
  #exportBar button {
    font: inherit;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    cursor: pointer;
  }
  #exportBar button:disabled { opacity: 0.5; cursor: default; }
  #exportStatus { min-width: 120px; }
</style>
</head>
<body>
  <div id="stopwatchContainer">
    <div id="digitalDisplay" class="hidden"></div>
    <svg id="segmentDisplay" class="hidden" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

<script>
(function () {
  "use strict";

  window.addEventListener("error", function (e) {
    console.error("[stopwatch] uncaught error:", e.message, "at", e.filename + ":" + e.lineno);
  });

  try {
    console.log("[stopwatch] boot start");

    // ---- Parse URL parameters ----
    var params = new URLSearchParams(window.location.search);

    function getInt(key, fallback) {
      var raw = params.get(key);
      if (raw === null || raw === "") return fallback;
      var value = parseInt(raw, 10);
      return Number.isFinite(value) ? value : fallback;
    }

    // Accepts "790", "790px", or "790 px" -> 790
    function getPx(key, fallback) {
      var raw = params.get(key);
      if (raw === null || raw === "") return fallback;
      var value = parseInt(String(raw).replace(/px/i, "").trim(), 10);
      return Number.isFinite(value) && value > 0 ? value : fallback;
    }

    var startFrom = getInt("startFrom", 0);
    var displayTypeRaw = params.get("displayType") || "hours,minutes,seconds";
    var displayType = displayTypeRaw
      .split(",")
      .map(function (s) { return s.trim().toLowerCase(); })
      .filter(Boolean);

    var startTimeParam = getInt("startTime", null);
    var displayStyle = (params.get("displayStyle") || "digital").toLowerCase();
    var displayFont = params.get("displayFont");
    var backgroundColor = params.get("backgroundColor") || "#000000";
    var color = params.get("color") || "#ffffff";

    // ---- New export parameters ----
    // Default dimensions depend on how many units are displayed:
    // 3+ units (e.g. hours,minutes,seconds) -> 790x130
    // 2 units  (e.g. minutes,seconds / hours,minutes) -> 500x130
    var defaultWidth = (displayType.length >= 3) ? 790 : 500;
    var defaultHeight = 130;
    var gifWidth = getPx("width", defaultWidth);
    var gifHeight = getPx("height", defaultHeight);
    var frameCount = getInt("frameCount", 900); // 900 = 15 min at 1 fps
    if (frameCount < 1) frameCount = 1;

    console.log("[stopwatch] params:", {
      startFrom: startFrom,
      displayType: displayType,
      startTime: startTimeParam,
      displayStyle: displayStyle,
      displayFont: displayFont,
      backgroundColor: backgroundColor,
      color: color,
      gifWidth: gifWidth,
      gifHeight: gifHeight,
      frameCount: frameCount
    });

    var nowMs = Date.now();
    var anchorMs = (startTimeParam !== null) ? (startTimeParam * 1000) : nowMs;
    var baselineMs = anchorMs - (startFrom * 1000);

    var bodyEl = document.body;
    var containerEl = document.getElementById("stopwatchContainer");
    var digitalEl = document.getElementById("digitalDisplay");
    var svgEl = document.getElementById("segmentDisplay");

    if (!containerEl || !digitalEl || !svgEl) {
      console.error("[stopwatch] missing DOM elements");
      return;
    }

    bodyEl.style.backgroundColor = backgroundColor;
    containerEl.style.backgroundColor = backgroundColor;

    var useSevenSegment = (displayStyle === "7-segment" || displayStyle === "7segment");

    var wantDays = displayType.indexOf("days") !== -1;
    var wantHours = displayType.indexOf("hours") !== -1;
    var wantMinutes = displayType.indexOf("minutes") !== -1;
    var wantSeconds = displayType.indexOf("seconds") !== -1;
    var wantMillis = displayType.indexOf("miliseconds") !== -1
                  || displayType.indexOf("milliseconds") !== -1;

    if (!wantDays && !wantHours && !wantMinutes && !wantSeconds && !wantMillis) {
      console.warn("[stopwatch] no valid displayType units; defaulting to seconds");
      wantSeconds = true;
    }

    function pad(num, size) {
      var s = String(num);
      while (s.length < size) s = "0" + s;
      return s;
    }

    function formatElapsed(totalMs) {
      if (totalMs < 0) totalMs = 0;
      var msPerDay = 86400000, msPerHour = 3600000, msPerMinute = 60000, msPerSecond = 1000;
      var days = 0, hours = 0, minutes = 0, seconds = 0, millis = 0;
      var r = totalMs;

      if (wantDays) {
        days = Math.floor(r / msPerDay); r -= days * msPerDay;
        if (wantHours) { hours = Math.floor(r / msPerHour); r -= hours * msPerHour; }
        if (wantMinutes) { minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute; }
        if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
        if (wantMillis) { millis = Math.floor(r); }
      } else if (wantHours) {
        hours = Math.floor(r / msPerHour); r -= hours * msPerHour;
        if (wantMinutes) { minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute; }
        if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
        if (wantMillis) { millis = Math.floor(r); }
      } else if (wantMinutes) {
        minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute;
        if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
        if (wantMillis) { millis = Math.floor(r); }
      } else if (wantSeconds) {
        seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond;
        if (wantMillis) { millis = Math.floor(r); }
      } else if (wantMillis) {
        millis = Math.floor(r);
      } else {
        seconds = Math.floor(r / msPerSecond);
      }

      var parts = [];
      if (wantDays) parts.push(pad(days, 2));
      if (wantHours) parts.push(pad(hours, 2));
      if (wantMinutes) parts.push(pad(minutes, 2));
      if (wantSeconds) parts.push(pad(seconds, 2));

      var text = parts.join(":");
      if (wantMillis) {
        var ms = pad(millis, 3);
        text = text.length ? (text + "." + ms) : ms;
      }
      if (!text.length) text = pad(seconds, 2);
      return text;
    }

    // =========================================================
    //  SEGMENT GEOMETRY (shared by SVG live view and canvas export)
    // =========================================================
    var SEGMENT_MAP = {
      "0": ["a", "b", "c", "d", "e", "f"],
      "1": ["b", "c"],
      "2": ["a", "b", "g", "e", "d"],
      "3": ["a", "b", "g", "c", "d"],
      "4": ["f", "g", "b", "c"],
      "5": ["a", "f", "g", "c", "d"],
      "6": ["a", "f", "g", "e", "c", "d"],
      "7": ["a", "b", "c"],
      "8": ["a", "b", "c", "d", "e", "f", "g"],
      "9": ["a", "b", "c", "d", "f", "g"]
    };

    var DIGIT_WIDTH = 60, DIGIT_HEIGHT = 100, T = 10, G = 2;
    var ALL_SEGMENTS = ["a", "b", "c", "d", "e", "f", "g"];
    var COLON_WIDTH = 26, DOT_WIDTH = 34, SPACING = 12;
    var OFF_OPACITY = 0.12;
    var SVG_NS = "http://www.w3.org/2000/svg";

    // Point arrays (used directly by canvas; joined to strings for SVG).
    function segmentPointArrays() {
      var w = DIGIT_WIDTH, h = DIGIT_HEIGHT, midY = h / 2;
      return {
        a: [[G + T / 2, G], [w - T / 2 - G, G], [w - T - G, T + G], [T + G, T + G]],
        g: [[G + T / 2, midY], [w - T / 2 - G, midY], [w - T - G, midY + T / 2], [T + G, midY + T / 2], [G, midY], [T + G, midY - T / 2], [w - T - G, midY - T / 2], [w - T / 2 - G, midY]],
        d: [[G + T / 2, h - G], [w - T / 2 - G, h - G], [w - T - G, h - T - G], [T + G, h - T - G]],
        f: [[G, G + T / 2], [T + G, T + G], [T + G, midY - T / 2 - G], [G, midY - G]],
        b: [[w - G, G + T / 2], [w - T - G, T + G], [w - T - G, midY - T / 2 - G], [w - G, midY - G]],
        e: [[G, midY + G], [T + G, midY + T / 2 + G], [T + G, h - T - G], [G, h - T / 2 - G]],
        c: [[w - G, midY + G], [w - T - G, midY + T / 2 + G], [w - T - G, h - T - G], [w - G, h - T / 2 - G]]
      };
    }

    var POINT_ARRAYS = segmentPointArrays();
    var POLYS = (function () {
      var out = {};
      for (var k in POINT_ARRAYS) {
        if (POINT_ARRAYS.hasOwnProperty(k)) {
          out[k] = POINT_ARRAYS[k].map(function (p) { return p[0] + "," + p[1]; }).join(" ");
        }
      }
      return out;
    })();

    // ---- Live SVG seven-segment renderer ----
    var cellRefs = [];
    var currentLayout = "";

    function layoutSignature(text) {
      var sig = "";
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        sig += (ch >= "0" && ch <= "9") ? "D" : ch;
      }
      return sig;
    }

    function buildSvgLayout(text) {
      var totalWidth = 0, i;
      for (i = 0; i < text.length; i++) {
        var ch = text[i];
        if (ch >= "0" && ch <= "9") totalWidth += DIGIT_WIDTH + SPACING;
        else if (ch === ":") totalWidth += COLON_WIDTH + SPACING;
        else if (ch === ".") totalWidth += DOT_WIDTH + SPACING;
      }
      totalWidth -= SPACING;
      if (totalWidth < 1) totalWidth = 1;

      svgEl.setAttribute("viewBox", "0 0 " + totalWidth + " " + DIGIT_HEIGHT);
      while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);
      cellRefs = [];

      var x = 0;
      for (var j = 0; j < text.length; j++) {
        var c = text[j];
        if (c >= "0" && c <= "9") {
          var group = document.createElementNS(SVG_NS, "g");
          group.setAttribute("transform", "translate(" + x + ",0)");
          var segEls = {};
          for (var k = 0; k < ALL_SEGMENTS.length; k++) {
            var seg = ALL_SEGMENTS[k];
            var poly = document.createElementNS(SVG_NS, "polygon");
            poly.setAttribute("points", POLYS[seg]);
            poly.setAttribute("fill", color);
            group.appendChild(poly);
            segEls[seg] = poly;
          }
          svgEl.appendChild(group);
          cellRefs.push({ type: "digit", segEls: segEls });
          x += DIGIT_WIDTH + SPACING;
        } else if (c === ":") {
          var cx = x + COLON_WIDTH / 2;
          var fracs = [0.33, 0.67];
          for (var fI = 0; fI < fracs.length; fI++) {
            var dot = document.createElementNS(SVG_NS, "rect");
            dot.setAttribute("x", cx - T / 2);
            dot.setAttribute("y", DIGIT_HEIGHT * fracs[fI] - T / 2);
            dot.setAttribute("width", T);
            dot.setAttribute("height", T);
            dot.setAttribute("fill", color);
            svgEl.appendChild(dot);
          }
          cellRefs.push({ type: "colon" });
          x += COLON_WIDTH + SPACING;
        } else if (c === ".") {
          var pdot = document.createElementNS(SVG_NS, "rect");
          pdot.setAttribute("x", x + DOT_WIDTH / 2 - T / 2);
          pdot.setAttribute("y", DIGIT_HEIGHT - T);
          pdot.setAttribute("width", T);
          pdot.setAttribute("height", T);
          pdot.setAttribute("fill", color);
          svgEl.appendChild(pdot);
          cellRefs.push({ type: "dot" });
          x += DOT_WIDTH + SPACING;
        }
      }
      currentLayout = layoutSignature(text);
    }

    function updateSegments(text) {
      var cellIndex = 0;
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        var cell = cellRefs[cellIndex];
        if (!cell) break;
        if (ch >= "0" && ch <= "9") {
          var litSet = SEGMENT_MAP[ch];
          for (var k = 0; k < ALL_SEGMENTS.length; k++) {
            var seg = ALL_SEGMENTS[k];
            cell.segEls[seg].setAttribute(
              "opacity",
              litSet.indexOf(seg) !== -1 ? "1" : String(OFF_OPACITY)
            );
          }
        }
        cellIndex++;
      }
    }

    function renderSevenSegment(text) {
      if (layoutSignature(text) !== currentLayout) buildSvgLayout(text);
      updateSegments(text);
    }

    // ---- Digital renderer ----
    function sizeDigitalFont() {
      var vw = window.innerWidth, vh = window.innerHeight;
      var charCount = Math.max(digitalEl.textContent.length, 6);
      var byWidth = (vw * 0.9) / (charCount * 0.62);
      var byHeight = vh * 0.6;
      var fontSize = Math.max(12, Math.min(byWidth, byHeight));
      digitalEl.style.fontSize = fontSize + "px";
    }

    // ---- Live render loop ----
    var lastText = "";
    function draw() {
      var elapsedMs = Date.now() - baselineMs;
      var text = formatElapsed(elapsedMs);
      if (text === lastText) return;
      if (useSevenSegment) renderSevenSegment(text);
      else {
        digitalEl.textContent = text;
        if (text.length !== lastText.length) sizeDigitalFont();
      }
      lastText = text;
    }
    function tickRAF() { draw(); requestAnimationFrame(tickRAF); }
    function startLoop() {
      if (wantMillis) { requestAnimationFrame(tickRAF); }
      else { draw(); setInterval(draw, 250); }
    }

    if (useSevenSegment) {
      svgEl.classList.remove("hidden");
      digitalEl.classList.add("hidden");
    } else {
      digitalEl.classList.remove("hidden");
      svgEl.classList.add("hidden");
      digitalEl.style.color = color;
      digitalEl.style.fontFamily = displayFont ? (displayFont + ", monospace") : "monospace";
    }
    window.addEventListener("resize", function () { if (!useSevenSegment) sizeDigitalFont(); });
    startLoop();

    // =========================================================
    //  CANVAS FRAME RENDERER (for GIF export)
    // =========================================================
    // Measures the natural pixel width of the formatted string in segment
    // units, then scales to fit within the requested GIF width/height while
    // preserving aspect ratio and centering.
    function measureUnitsWidth(text) {
      var w = 0;
      for (var i = 0; i < text.length; i++) {
        var ch = text[i];
        if (ch >= "0" && ch <= "9") w += DIGIT_WIDTH + SPACING;
        else if (ch === ":") w += COLON_WIDTH + SPACING;
        else if (ch === ".") w += DOT_WIDTH + SPACING;
      }
      w -= SPACING;
      return w < 1 ? 1 : w;
    }

    function drawSegmentPolygon(ctx, pts, fillStyle, alpha) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = fillStyle;
      ctx.beginPath();
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (var i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Renders one frame's text onto ctx sized (canvasW x canvasH).
    function renderFrameToCanvas(ctx, canvasW, canvasH, text) {
      ctx.save();
      ctx.fillStyle = backgroundColor;
      ctx.fillRect(0, 0, canvasW, canvasH);

      if (useSevenSegment) {
        var unitsW = measureUnitsWidth(text);
        var unitsH = DIGIT_HEIGHT;
        // Scale to fit with a small margin (0.9).
        var scale = Math.min((canvasW * 0.9) / unitsW, (canvasH * 0.9) / unitsH);
        var drawW = unitsW * scale, drawH = unitsH * scale;
        var offsetX = (canvasW - drawW) / 2;
        var offsetY = (canvasH - drawH) / 2;

        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        var x = 0;
        for (var i = 0; i < text.length; i++) {
          var ch = text[i];
          if (ch >= "0" && ch <= "9") {
            var litSet = SEGMENT_MAP[ch];
            ctx.save();
            ctx.translate(x, 0);
            for (var k = 0; k < ALL_SEGMENTS.length; k++) {
              var seg = ALL_SEGMENTS[k];
              var lit = litSet.indexOf(seg) !== -1;
              drawSegmentPolygon(ctx, POINT_ARRAYS[seg], color, lit ? 1 : OFF_OPACITY);
            }
            ctx.restore();
            x += DIGIT_WIDTH + SPACING;
          } else if (ch === ":") {
            var cx = x + COLON_WIDTH / 2;
            var fracs = [0.33, 0.67];
            for (var fI = 0; fI < fracs.length; fI++) {
              ctx.fillStyle = color;
              ctx.globalAlpha = 1;
              ctx.fillRect(cx - T / 2, DIGIT_HEIGHT * fracs[fI] - T / 2, T, T);
            }
            x += COLON_WIDTH + SPACING;
          } else if (ch === ".") {
            ctx.fillStyle = color;
            ctx.globalAlpha = 1;
            ctx.fillRect(x + DOT_WIDTH / 2 - T / 2, DIGIT_HEIGHT - T, T, T);
            x += DOT_WIDTH + SPACING;
          }
        }
      } else {
        // Digital: fit font to canvas.
        var fontFamily = displayFont ? (displayFont + ", monospace") : "monospace";
        var fontSize = Math.min(canvasH * 0.7, (canvasW * 0.9) / (Math.max(text.length, 1) * 0.62));
        ctx.fillStyle = color;
        ctx.font = "bold " + fontSize + "px " + fontFamily;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(text, canvasW / 2, canvasH / 2);
      }
      ctx.restore();
    }

    // =========================================================
    //  GIF EXPORT
    // =========================================================
    var GIFJS_URL = "https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js";
    var GIFJS_WORKER_URL = "https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js";
    var gifLibLoading = null;
    var workerBlobLoading = null;
    var workerBlobURL = null;

    function loadGifLib() {
      if (window.GIF) return Promise.resolve();
      if (gifLibLoading) return gifLibLoading;
      gifLibLoading = new Promise(function (resolve, reject) {
        var s = document.createElement("script");
        s.src = GIFJS_URL;
        s.onload = function () { console.log("[stopwatch] gif.js loaded"); resolve(); };
        s.onerror = function () { reject(new Error("failed to load gif.js from CDN")); };
        document.head.appendChild(s);
      });
      return gifLibLoading;
    }

    // A Worker cannot be constructed from a cross-origin script URL, so we
    // fetch the worker source from the CDN and wrap it in a same-origin blob
    // URL. gif.js is then pointed at that blob. Resolves to a blob URL, or to
    // null if the fetch fails (caller falls back to zero workers).
    function loadWorkerBlobURL() {
      if (workerBlobURL) return Promise.resolve(workerBlobURL);
      if (workerBlobLoading) return workerBlobLoading;
      workerBlobLoading = fetch(GIFJS_WORKER_URL)
        .then(function (resp) {
          if (!resp.ok) throw new Error("worker fetch HTTP " + resp.status);
          return resp.text();
        })
        .then(function (src) {
          var blob = new Blob([src], { type: "application/javascript" });
          workerBlobURL = URL.createObjectURL(blob);
          console.log("[stopwatch] gif worker wrapped as same-origin blob");
          return workerBlobURL;
        })
        .catch(function (err) {
          console.warn("[stopwatch] worker blob unavailable, will use 0 workers:", err && err.message);
          return null;
        });
      return workerBlobLoading;
    }

    // Generates a GIF where frame N (0-based) shows the stopwatch at
    // (startFrom + N) seconds. One frame per second, 1000ms delay each.
    function exportGif(onProgress) {
      return loadGifLib().then(function () {
        return loadWorkerBlobURL();
      }).then(function (blobWorkerURL) {
        return new Promise(function (resolve, reject) {
          // Use 2 workers when we have a same-origin blob worker; otherwise
          // fall back to 0 workers (slower, but encodes on the main thread
          // without needing a worker script).
          var gifOptions = {
            quality: 10,
            width: gifWidth,
            height: gifHeight,
            background: backgroundColor,
            repeat: 0
          };
          if (blobWorkerURL) {
            gifOptions.workers = 2;
            gifOptions.workerScript = blobWorkerURL;
          } else {
            gifOptions.workers = 0;
          }
          var gif = new window.GIF(gifOptions);

          var canvas = document.createElement("canvas");
          canvas.width = gifWidth;
          canvas.height = gifHeight;
          var ctx = canvas.getContext("2d");

          console.log("[stopwatch] rendering", frameCount, "frames at", gifWidth + "x" + gifHeight);
          for (var n = 0; n < frameCount; n++) {
            var elapsedMs = (startFrom + n) * 1000;
            var text = formatElapsed(elapsedMs);
            renderFrameToCanvas(ctx, gifWidth, gifHeight, text);
            gif.addFrame(ctx, { copy: true, delay: 1000 });
          }

          gif.on("progress", function (p) {
            if (onProgress) onProgress(p);
          });
          gif.on("finished", function (blob) {
            console.log("[stopwatch] GIF finished, bytes:", blob.size);
            resolve(blob);
          });
          gif.on("abort", function () { reject(new Error("gif render aborted")); });

          gif.render();
        });
      });
    }

    function downloadBlob(blob, filename) {
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    }

    // Expose a programmatic hook so the export can be triggered from the
    // Apps Script overlay or console without the UI.
    window.stopwatchExportGif = function () {
      return exportGif(function (p) {
        console.log("[stopwatch] encoding", Math.round(p * 100) + "%");
      }).then(function (blob) {
        downloadBlob(blob, "stopwatch.gif");
        return blob;
      });
    };

    // ---- Optional export UI ----
    // Shown when ?export=1 (or ?showExport=1) is present, so the plain
    // embedded stopwatch stays clean by default.
    var showExport = params.get("export") === "1" || params.get("showExport") === "1";
    if (showExport) {
      var bar = document.createElement("div");
      bar.id = "exportBar";
      var btn = document.createElement("button");
      btn.textContent = "Download GIF";
      var status = document.createElement("span");
      status.id = "exportStatus";
      status.textContent = frameCount + " frames \u00b7 " + gifWidth + "\u00d7" + gifHeight;
      bar.appendChild(btn);
      bar.appendChild(status);
      document.body.appendChild(bar);

      btn.addEventListener("click", function () {
        btn.disabled = true;
        status.textContent = "Rendering\u2026";
        exportGif(function (p) {
          status.textContent = "Encoding " + Math.round(p * 100) + "%";
        }).then(function (blob) {
          downloadBlob(blob, "stopwatch.gif");
          status.textContent = "Done \u00b7 " + Math.round(blob.size / 1024) + " KB";
          btn.disabled = false;
        }).catch(function (err) {
          console.error("[stopwatch] export failed:", err && err.message);
          status.textContent = "Export failed (see console)";
          btn.disabled = false;
        });
      });
    }

    console.log("[stopwatch] boot complete");

  } catch (err) {
    console.error("[stopwatch] fatal init error:", err && err.message, err && err.stack);
  }
})();
</script>
</body>
</html>
