<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
  }
  #stopwatchContainer {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
    box-sizing: border-box;
  }
  /* Digital (regular numerals) display */
  #digitalDisplay {
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    white-space: nowrap;
    line-height: 1;
    user-select: none;
  }
  /* SVG seven-segment display fills available space */
  #segmentDisplay {
    width: 90vw;
    height: 60vh;
    user-select: none;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>
  <div id="stopwatchContainer">
    <div id="digitalDisplay" class="hidden"></div>
    <svg id="segmentDisplay" class="hidden" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

<script>
(function () {
  "use strict";

  // ---- Parse URL parameters ----
  const params = new URLSearchParams(window.location.search);

  function getInt(key, fallback) {
    const raw = params.get(key);
    if (raw === null || raw === "") return fallback;
    const value = parseInt(raw, 10);
    return Number.isFinite(value) ? value : fallback;
  }

  const startFrom = getInt("startFrom", 0);
  const displayTypeRaw = params.get("displayType") || "hours,minutes,seconds";
  const displayType = displayTypeRaw
    .split(",")
    .map(s => s.trim().toLowerCase())
    .filter(Boolean);

  const startTimeParam = getInt("startTime", null);
  const displayStyle = (params.get("displayStyle") || "digital").toLowerCase();
  const displayFont = params.get("displayFont");
  const backgroundColor = params.get("backgroundColor") || "#000000";
  const color = params.get("color") || "#ffffff";

  // ---- Reference epoch (ms) ----
  const nowMs = Date.now();
  const anchorMs = (startTimeParam !== null) ? (startTimeParam * 1000) : nowMs;
  const baselineMs = anchorMs - (startFrom * 1000);

  // ---- Elements & styling ----
  const bodyEl = document.body;
  const containerEl = document.getElementById("stopwatchContainer");
  const digitalEl = document.getElementById("digitalDisplay");
  const svgEl = document.getElementById("segmentDisplay");

  bodyEl.style.backgroundColor = backgroundColor;
  containerEl.style.backgroundColor = backgroundColor;

  const useSevenSegment = (displayStyle === "7-segment" || displayStyle === "7segment");

  // ---- Unit flags ----
  const wantDays = displayType.includes("days");
  const wantHours = displayType.includes("hours");
  const wantMinutes = displayType.includes("minutes");
  const wantSeconds = displayType.includes("seconds");
  const wantMillis = displayType.includes("miliseconds")
                  || displayType.includes("milliseconds");

  function pad(num, size) {
    let s = String(num);
    while (s.length < size) s = "0" + s;
    return s;
  }

  function formatElapsed(totalMs) {
    if (totalMs < 0) totalMs = 0;

    const msPerDay = 86400000;
    const msPerHour = 3600000;
    const msPerMinute = 60000;
    const msPerSecond = 1000;

    let days = 0, hours = 0, minutes = 0, seconds = 0, millis = 0;
    let r = totalMs;

    // Highest enabled unit absorbs all overflow above it.
    if (wantDays) {
      days = Math.floor(r / msPerDay); r -= days * msPerDay;
      if (wantHours) { hours = Math.floor(r / msPerHour); r -= hours * msPerHour; }
      if (wantMinutes) { minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute; }
      if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
      if (wantMillis) { millis = Math.floor(r); }
    } else if (wantHours) {
      hours = Math.floor(r / msPerHour); r -= hours * msPerHour;
      if (wantMinutes) { minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute; }
      if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
      if (wantMillis) { millis = Math.floor(r); }
    } else if (wantMinutes) {
      minutes = Math.floor(r / msPerMinute); r -= minutes * msPerMinute;
      if (wantSeconds) { seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond; }
      if (wantMillis) { millis = Math.floor(r); }
    } else if (wantSeconds) {
      seconds = Math.floor(r / msPerSecond); r -= seconds * msPerSecond;
      if (wantMillis) { millis = Math.floor(r); }
    } else if (wantMillis) {
      millis = Math.floor(r);
    }

    const parts = [];
    if (wantDays) parts.push(pad(days, 2));
    if (wantHours) parts.push(pad(hours, 2));
    if (wantMinutes) parts.push(pad(minutes, 2));
    if (wantSeconds) parts.push(pad(seconds, 2));

    let text = parts.join(":");
    if (wantMillis) {
      const ms = pad(millis, 3);
      text = text.length ? (text + "." + ms) : ms;
    }
    if (!text.length) text = "0";
    return text;
  }

  // =========================================================
  //  SEVEN-SEGMENT SVG RENDERER (no external dependencies)
  // =========================================================
  // Segment layout per digit:
  //        a
  //      -----
  //   f |     | b
  //     |  g  |
  //      -----
  //   e |     | c
